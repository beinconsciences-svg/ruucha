<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruucha - 宝石図鑑</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
    }

    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .filters input,
    .filters select {
      padding: 12px 15px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      flex: 1;
      min-width: 200px;
    }

    .filters input:focus,
    .filters select:focus {
      outline: none;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      transform: translateY(-2px);
    }

    .gemstones-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .gemstone-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .gemstone-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .gemstone-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      color: white;
      overflow: hidden;
    }

    .gemstone-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gemstone-content {
      padding: 20px;
    }

    .gemstone-card h2 {
      font-size: 1.5em;
      margin-bottom: 8px;
      color: #333;
    }

    .gemstone-card .english-name {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 12px;
    }

    .gemstone-card .rarity {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .rarity.超レア {
      background: #ff6b6b;
      color: white;
    }

    .rarity.レア {
      background: #ffa94d;
      color: white;
    }

    .rarity.やや一般的 {
      background: #74c0fc;
      color: white;
    }

    .rarity.一般的 {
      background: #51cf66;
      color: white;
    }

    .gemstone-info {
      font-size: 0.95em;
      line-height: 1.6;
      color: #555;
      margin-bottom: 12px;
    }

    .gemstone-info p {
      margin: 5px 0;
    }

    .price-range {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 6px;
      margin: 10px 0;
      font-weight: bold;
      color: #667eea;
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.3s ease;
      justify-content: center;
      align-items: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: slideIn 0.3s ease;
    }

    .modal-image {
      width: 100%;
      height: 300px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 120px;
      border-radius: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .modal-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .close {
      position: absolute;
      right: 20px;
      top: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #999;
      cursor: pointer;
      z-index: 1001;
    }

    .close:hover {
      color: #333;
    }

    .mining-location {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 8px;
      margin: 10px 0;
      border-left: 4px solid #667eea;
    }

    .mining-location h4 {
      color: #667eea;
      margin-bottom: 8px;
      font-size: 1.1em;
    }

    .mining-location p {
      color: #555;
      line-height: 1.6;
      margin: 5px 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .gemstones-container {
        grid-template-columns: 1fr;
      }

      .filters {
        flex-direction: column;
      }

      .filters input,
      .filters select {
        width: 100%;
        min-width: auto;
      }
    }
  </style>
</head>

      {"id": 34, "name": "パライバトルマリン", "englishName": "Paraiba Tourmaline", "imageUrl": "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&h=500&fit=crop", "category": "珪酸塩鉱物", "rarity": "超レア", "hardness": 7, "colors": ["ネオンブルー", "ターコイズ"], "priceRange": {"min": 50000, "max": 3000000, "unit": "1カラット"}, "description": "ネオンのような鮮やかなブルーが特徴。最近発見された希少な宝石です。", "miningLocations": [{"country": "ブラジル", "region": "パライバ州", "mines": "セローノ・アズール地方", "coordinates": "南緯7.0°、西経36.8°"}, {"country": "ナイジェリア", "region": "ケッビ州", "mines": "ナイジェリア北部", "coordinates": "北緯12.3°、東経4.1°"}], "uses": ["宝飾品"]},
      {"id": 35, "name": "パダラシャサファイア", "englishName": "Padparadscha Sapphire", "imageUrl": "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&h=500&fit=crop", "category": "コランダム", "rarity": "超レア", "hardness": 9, "colors": ["ピンク・オレンジ"], "priceRange": {"min": 100000, "max": 5000000, "unit": "1カラット"}, "description": "ピンクとオレンジが混ざったレアなサファイア。蓮の花の色という意味です。", "miningLocations": [{"country": "スリランカ", "region": "サバラガムワ州", "mines": "ラットナプラ地方", "coordinates": "南緯6.7°、東経80.8°"}, {"country": "タンザニア", "region": "アルーシャ州", "mines": "メレラニ地方", "coordinates": "南緯3.3°、東経36.7°"}], "uses": ["宝飾品"]},
      {"id": 36, "name": "ラリマー", "englishName": "Larimar", "imageUrl": "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&h=500&fit=crop", "category": "珪酸塩鉱物", "rarity": "レア", "hardness": 4.5, "colors": ["青", "ターコイズ"], "priceRange": {"min": 2000, "max": 300000, "unit": "1カラット"}, "description": "カリブ海の色を持つ希少な宝石。ドミニカ共和国でのみ採掘されます。", "miningLocations": [{"country": "ドミニカ共和国", "region": "バオルコ県", "mines": "ラ・プエバ地方（世界唯一の採掘地）", "coordinates": "北緯18.3°、西経71.3°"}], "uses": ["宝飾品", "装飾品"]},
      {"id": 37, "name": "モルダバイト", "englishName": "Moldavite", "imageUrl": "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&h=500&fit=crop", "category": "テクタイト", "rarity": "レア", "hardness": 5.5, "colors": ["緑"], "priceRange": {"min": 3000, "max": 500000, "unit": "1カラット"}, "description": "隕石衝突により形成された天然ガラス。宇宙からの贈り物とも呼ばれます。", "miningLocations": [{"country": "チェコ", "region": "モルダヴァ地方", "mines": "モルダヴァ盆地（950万年前の隕石衝突地）", "coordinates": "北緯48.9°、東経15.3°"}, {"country": "オーストリア", "region": "ニーダーエスターライヒ州", "mines": "オーストリア東部", "coordinates": "北緯48.5°、東経15.5°"}], "uses": ["宝飾品", "装飾品", "コレクター向け"]}
    ];

    let allGemstones = gemstonesData;

    document.addEventListener('DOMContentLoaded', () => {
      displayGemstones(allGemstones);
      setupEventListeners();
    });

    function setupEventListeners() {
      const searchInput = document.getElementById('searchInput');
      const rarityFilter = document.getElementById('rarityFilter');
      const modal = document.getElementById('modal');
      const closeBtn = document.querySelector('.close');

      searchInput.addEventListener('input', filterGemstones);
      rarityFilter.addEventListener('change', filterGemstones);

      closeBtn.addEventListener('click', () => {
        modal.classList.remove('show');
      });

      window.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('show');
        }
      });
    }

    function filterGemstones() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const rarityFilter = document.getElementById('rarityFilter').value;

      const filtered = allGemstones.filter(gemstone => {
        const matchesSearch = gemstone.name.toLowerCase().includes(searchTerm) ||
                             gemstone.englishName.toLowerCase().includes(searchTerm);
        const matchesRarity = rarityFilter === '' || gemstone.rarity === rarityFilter;
        return matchesSearch && matchesRarity;
      });

      displayGemstones(filtered);
    }

    function displayGemstones(gemstones) {
      const container = document.getElementById('gemstonesContainer');
      container.innerHTML = '';

      if (gemstones.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: white; font-size: 1.2em;">該当する宝石がありません</p>';
        return;
      }

      gemstones.forEach(gemstone => {
        const card = createGemstoneCard(gemstone);
        container.appendChild(card);
      });
    }

    function createGemstoneCard(gemstone) {
      const card = document.createElement('div');
      card.className = 'gemstone-card';
      card.innerHTML = `
        <div class="gemstone-image">
          <img src="${gemstone.imageUrl}" alt="${gemstone.name}" onerror="this.style.display='none'">
        </div>
        <div class="gemstone-content">
          <h2>${gemstone.name}</h2>
          <p class="english-name">${gemstone.englishName}</p>
          <span class="rarity ${gemstone.rarity}">${gemstone.rarity}</span>
          <div class="gemstone-info">
            <p><strong>カテゴリー:</strong> ${gemstone.category}</p>
            <p><strong>硬度:</strong> ${gemstone.hardness}</p>
            <p><strong>色:</strong> ${gemstone.colors.join(', ')}</p>
            <div class="price-range">
              ¥${gemstone.priceRange.min.toLocaleString()} - ¥${gemstone.priceRange.max.toLocaleString()} / ${gemstone.priceRange.unit}
            </div>
          </div>
        </div>
      `;

      card.addEventListener('click', () => showModal(gemstone));
      return card;
    }

    function showModal(gemstone) {
      const modal = document.getElementById('modal');
      const modalBody = document.getElementById('modalBody');

      const locationHTML = gemstone.miningLocations.map(loc => `
        <div class="mining-location">
          <h4>${loc.country}</h4>
          <p><strong>採掘地域:</strong> ${loc.region}</p>
          <p><strong>鉱山:</strong> ${loc.mines}</p>
          <p><strong>座標:</strong> ${loc.coordinates}</p>
        </div>
      `).join('');

      modalBody.innerHTML = `
        <div class="modal-image">
          <img src="${gemstone.imageUrl}" alt="${gemstone.name}" onerror="this.style.display='none'">
        </div>
        <h2>${gemstone.name}</h2>
        <p><strong style="color: #667eea;">${gemstone.englishName}</strong></p>
        <hr style="margin: 15px 0; border: none; border-top: 1px solid #eee;">
        
        <div style="margin: 15px 0;">
          <h3>基本情報</h3>
          <p><strong>カテゴリー:</strong> ${gemstone.category}</p>
          <p><strong>レアリティ:</strong> <span class="rarity ${gemstone.rarity}">${gemstone.rarity}</span></p>
          <p><strong>硬度:</strong> ${gemstone.hardness}</p>
          <p><strong>色:</strong> ${gemstone.colors.join(', ')}</p>
        </div>

        <div style="margin: 15px 0;">
          <h3>説明</h3>
          <p>${gemstone.description}</p>
        </div>

        <div style="margin: 15px 0;">
          <h3>価格相場</h3>
          <p style="font-size: 1.2em; color: #667eea; font-weight: bold;">
            ¥${gemstone.priceRange.min.toLocaleString()} - ¥${gemstone.priceRange.max.toLocaleString()} / ${gemstone.priceRange.unit}
          </p>
        </div>

        <div style="margin: 15px 0;">
          <h3>🏔️ 採掘地・取れる場所</h3>
          ${locationHTML}
        </div>

        <div style="margin: 15px 0;">
          <h3>用途</h3>
          <p>${gemstone.uses.join(', ')}</p>
        </div>
      `;

      modal.classList.add('show');
    }
  </script>
</body>
</html>
